<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Flores Amarillas</title>

<!-- Tipografía elegante tipo carta -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    overflow: hidden;

    /* 📜 fondo tipo papel beige */
    background: 
      radial-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
      linear-gradient(#f5e6c8, #ecd9a3);
    background-size: 3px 3px, 100% 100%;

    font-family: 'Cormorant Garamond', serif;
  }

  h1 {
    position: absolute;
    width: 100%;
    top: 20%;
    text-align: center;
    color: #4a3200;
    font-size: 2.2rem;
    padding: 0 20px;
    font-family: 'Playfair Display', serif;
    line-height: 1.4;
  }

  /* ✍️ mensaje escondido */
  p {
    position: absolute;
    bottom: 25px;
    left: 30px;

    color: #4a3200;
    font-size: 1rem;
    max-width: 320px;

    opacity: 0.35;
    font-style: italic;
    letter-spacing: 0.5px;
  }

  .flower {
    position: absolute;
    top: -100px;
    width: 60px;
    height: 60px;
    animation: fall linear infinite;
  }

  /* 🌼 caída más lenta y natural */
  @keyframes fall {
    from {
      transform: translateY(0) rotate(0deg) scale(var(--scale));
    }
    to {
      transform: translateY(110vh) rotate(360deg) scale(var(--scale));
    }
  }
</style>
</head>

<body>

<h1>
  Desde que llegaste, todo florece distinto… 🌼 <br>
  contigo, todo tiene un sentido especial 💛 <br>
  y desde entonces, todo se siente un poco más especial. ✨
</h1>

<p>
  y si pudiera elegir un lugar seguro, siempre sería a tu lado.
</p>

<script>

function createSVGFlower() {
  return `
  <svg viewBox="0 0 100 100">
    ${[...Array(12)].map((_, i) => {
      const angle = i * 30;
      return `<ellipse cx="50" cy="18" rx="12" ry="28"
              fill="#f4c200"
              transform="rotate(${angle} 50 50)" />`;
    }).join("")}

    ${[...Array(12)].map((_, i) => {
      const angle = i * 30 + 15;
      return `<ellipse cx="50" cy="22" rx="10" ry="24"
              fill="#ffd84d"
              transform="rotate(${angle} 50 50)" />`;
    }).join("")}

    <circle cx="50" cy="50" r="20" fill="#7a3e00"/>
    <circle cx="50" cy="50" r="14" fill="#8c4a00"/>
  </svg>
  `;
}

function createFlower() {
  const flower = document.createElement("div");
  flower.classList.add("flower");

  flower.innerHTML = createSVGFlower();

  flower.style.left = Math.random() * window.innerWidth + "px";

  /* 🌼 MÁS LENTO */
  flower.style.animationDuration = (8 + Math.random() * 6) + "s";

  flower.style.setProperty("--scale", 0.4 + Math.random());

  document.body.appendChild(flower);

  setTimeout(() => {
    flower.remove();
  }, 14000);
}

/* menos cantidad = más elegante */
setInterval(createFlower, 400);

</script>

</body>
</html>
