<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Flores Amarillas</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;

    /* 🎨 fondo tipo carta */
    background: 
      radial-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
      linear-gradient(#fff8dc, #ffe8a3);
    background-size: 4px 4px, 100% 100%;
  }

  h1 {
    position: absolute;
    width: 100%;
    top: 20%;
    text-align: center;
    color: #5a3e00;
    font-size: 2rem;
    padding: 0 20px;
  }

  /* ✨ texto escondido estilo carta */
  p {
    position: absolute;
    bottom: 20px;
    left: 25px;

    color: #5a3e00;
    font-size: 0.9rem;
    max-width: 300px;

    opacity: 0.45; /* más tenue */
    font-style: italic;
    letter-spacing: 0.5px;

    transition: 0.3s;
  }

  /* pequeño efecto al pasar el mouse */
  p:hover {
    opacity: 0.75;
  }

  .flower {
    position: absolute;
    top: -100px;
    width: 60px;
    height: 60px;
    animation: fall linear infinite;
  }

  @keyframes fall {
    from {
      transform: translateY(0) rotate(0deg) scale(var(--scale));
    }
    to {
      transform: translateY(110vh) rotate(360deg) scale(var(--scale));
    }
  }
</style>
</head>

<body>

<h1>
  Desde que llegaste, todo florece distinto… 🌼 <br>
  contigo, todo tiene un sentido especial 💛 <br>
  y desde entonces, todo se siente un poco más especial. ✨
</h1>

<p>
  y si pudiera elegir un lugar seguro, siempre sería a tu lado.
</p>

<script>

function createSVGFlower() {
  return `
  <svg viewBox="0 0 100 100">
    ${[...Array(12)].map((_, i) => {
      const angle = i * 30;
      return `<ellipse cx="50" cy="18" rx="12" ry="28"
              fill="#f4c200"
              transform="rotate(${angle} 50 50)" />`;
    }).join("")}

    ${[...Array(12)].map((_, i) => {
      const angle = i * 30 + 15;
      return `<ellipse cx="50" cy="22" rx="10" ry="24"
              fill="#ffd84d"
              transform="rotate(${angle} 50 50)" />`;
    }).join("")}

    <circle cx="50" cy="50" r="20" fill="#7a3e00"/>
    <circle cx="50" cy="50" r="14" fill="#8c4a00"/>
  </svg>
  `;
}

function createFlower() {
  const flower = document.createElement("div");
  flower.classList.add("flower");

  flower.innerHTML = createSVGFlower();

  flower.style.left = Math.random() * window.innerWidth + "px";
  flower.style.animationDuration = (4 + Math.random() * 4) + "s";
  flower.style.setProperty("--scale", 0.4 + Math.random());

  document.body.appendChild(flower);

  setTimeout(() => {
    flower.remove();
  }, 8000);
}

setInterval(createFlower, 250);

</script>

</body>
</html>
